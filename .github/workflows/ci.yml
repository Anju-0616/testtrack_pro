name: CI — Lint, Typecheck & Build

# Runs on every PR to main or develop
# Runs on every direct push to develop
on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 — BACKEND
  # - Install deps via pnpm workspaces (root lockfile)
  # - Generate Prisma client
  # - Run migrations against a real test PostgreSQL container
  # - Boot the server and verify /api/health returns 200
  # ════════════════════════════════════════════════════════════
  backend:
    name: Backend — Prisma + Boot Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testtrack
          POSTGRES_PASSWORD: testtrack123
          POSTGRES_DB:       testtrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:       postgresql://testtrack:testtrack123@localhost:5432/testtrack_test
      JWT_SECRET:         ci_jwt_secret_32_chars_minimum_xx
      JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_min_xx
      NODE_ENV:           test
      PORT:               5000
      FRONTEND_URL:       http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm 8.15.4
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          # root pnpm-lock.yaml is the single source of truth
          cache-dependency-path: pnpm-lock.yaml

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec npx prisma generate

      - name: Run database migrations
        run: pnpm --filter api exec npx prisma migrate deploy

      - name: Verify server boots and /api/health responds
        run: |
          # Start API from its own directory
          cd apps/api
          node index.js &
          SERVER_PID=$!

          echo "⏳ Waiting for server..."
          for i in {1..20}; do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Server is up — /api/health returned 200"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done

          echo "❌ Server did not respond within 20s"
          kill $SERVER_PID 2>/dev/null
          exit 1

  # ════════════════════════════════════════════════════════════
  # JOB 2 — FRONTEND
  # - Install deps via pnpm workspaces
  # - ESLint  (eslint.config.js exists in apps/web)
  # - tsc -b  (TypeScript strict check — your exact build script)
  # - vite build via rolldown-vite (your override)
  # ════════════════════════════════════════════════════════════
  frontend:
    name: Frontend — Lint + Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm 8.15.4
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web run lint

      - name: Typecheck + Build
        # Uses your exact root script: pnpm --filter web run build
        # Which runs: tsc -b && vite build (rolldown-vite)
        run: pnpm --filter web run build
        env:
          VITE_API_URL: https://testtrack-api.onrender.com/api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # JOB 3 — CI GATE
  # Both jobs must pass before a PR can be merged
  # ════════════════════════════════════════════════════════════
  ci-gate:
    name: CI Gate (required to merge)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          BACKEND="${{ needs.backend.result }}"
          FRONTEND="${{ needs.frontend.result }}"

          echo "Backend  → $BACKEND"
          echo "Frontend → $FRONTEND"

          if [ "$BACKEND" = "success" ] && [ "$FRONTEND" = "success" ]; then
            echo "✅ All checks passed — ready to merge."
          else
            echo "❌ One or more checks failed. Fix before merging."
            exit 1
          fi