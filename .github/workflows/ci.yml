name: CI — Lint, Typecheck & Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  backend:
    name: Backend — Prisma Generate + Migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testtrack
          POSTGRES_PASSWORD: testtrack123
          POSTGRES_DB:       testtrack_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testtrack:testtrack123@localhost:5432/testtrack_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter api exec npx prisma generate

      - name: Prisma migrate
        run: pnpm --filter api exec npx prisma migrate deploy

  frontend:
    name: Frontend — Lint + Typecheck + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web run lint

      - name: Typecheck + Build
        run: pnpm --filter web run build
        env:
          VITE_API_URL: https://testtrack-api.onrender.com/api

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 1

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: All checks passed?
        run: |
          if [ "${{ needs.backend.result }}" = "success" ] && [ "${{ needs.frontend.result }}" = "success" ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ One or more checks failed."
            exit 1
          fi