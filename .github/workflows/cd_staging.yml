name: CD — Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 — Verify before deploying to staging
  # ════════════════════════════════════════════════════════════
  verify:
    name: Verify Before Staging Deploy
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testtrack
          POSTGRES_PASSWORD: testtrack123
          POSTGRES_DB:       testtrack_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-staging-${{ runner.os }}-${{ hashFiles('apps/api/pnpm-lock.yaml', 'apps/web/pnpm-lock.yaml') }}
          restore-keys: pnpm-staging-${{ runner.os }}-

      # ── Backend ──
      - name: Install API deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/api

      - name: Prisma generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://testtrack:testtrack123@localhost:5432/testtrack_test

      # ── Frontend ──
      - name: Install web deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Lint
        run: pnpm lint
        working-directory: apps/web

      - name: Build
        run: pnpm build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}

  # ════════════════════════════════════════════════════════════
  # JOB 2 — Deploy API to Render staging
  # Render Build Command (set in Render dashboard):
  #   pnpm install && npx prisma generate && npx prisma migrate deploy
  # Render Start Command:
  #   node index.js
  # ════════════════════════════════════════════════════════════
  deploy-api:
    name: Deploy API → Render Staging
    runs-on: ubuntu-latest
    needs: verify
    environment: staging

    steps:
      - name: Trigger Render staging deploy hook
        run: |
          echo "🚀 Triggering Render staging deploy..."
          curl -s "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Hook triggered — Render will install, migrate, and start"

      - name: Wait for Render to build and start
        run: |
          echo "⏳ Waiting 90s for Render build..."
          sleep 90

      - name: Health check — staging API
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.STAGING_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging API live (HTTP 200)"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS — retrying in 20s..."
            sleep 20
          done
          echo "❌ Staging API did not come up — check Render logs"
          exit 1

  # ════════════════════════════════════════════════════════════
  # JOB 3 — Deploy frontend to Vercel (staging preview)
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend → Vercel Staging
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel (preview)
        run: |
          vercel \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --cwd apps/web
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ════════════════════════════════════════════════════════════
  # JOB 4 — Smoke test staging
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Test Staging
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]

    steps:
      - name: Health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_API_URL }}/health")
          [ "$STATUS" = "200" ] && echo "✅ /health OK" || (echo "❌ /health $STATUS" && exit 1)

      - name: Auth endpoint alive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.STAGING_API_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"wrongpassword"}')
          if [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "422" ]; then
            echo "✅ /auth/login alive (HTTP $STATUS)"
          else
            echo "❌ Unexpected: $STATUS" && exit 1
          fi

      - name: Swagger docs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.STAGING_API_BASE_URL }}/api-docs/")
          echo "📚 Swagger: HTTP $STATUS"

      - name: Summary
        run: |
          echo "════════════════════════════════"
          echo "  ✅ Staging deploy complete!"
          echo "  API: ${{ secrets.STAGING_API_URL }}"
          echo "════════════════════════════════"