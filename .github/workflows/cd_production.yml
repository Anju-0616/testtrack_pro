name: CD — Deploy to Production

# Triggers only on merge to main
on:
  push:
    branches: [main]

# Never cancel a running production deploy
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1 — FULL VERIFY
  # ════════════════════════════════════════════════════════════
  verify:
    name: Full Verify Before Production
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testtrack
          POSTGRES_PASSWORD: testtrack123
          POSTGRES_DB:       testtrack_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm 8.15.4
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        run: |
          pnpm --filter api exec npx prisma generate
          pnpm --filter api exec npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://testtrack:testtrack123@localhost:5432/testtrack_test

      - name: Boot check — server starts correctly
        env:
          DATABASE_URL:       postgresql://testtrack:testtrack123@localhost:5432/testtrack_test
          JWT_SECRET:         ci_jwt_secret_32_chars_minimum_xx
          JWT_REFRESH_SECRET: ci_refresh_secret_32_chars_min_xx
          NODE_ENV:           test
          PORT:               5000
          FRONTEND_URL:       http://localhost:5173
        run: |
          cd apps/api && node index.js &
          PID=$!
          for i in {1..20}; do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Server boots correctly"
              kill $PID
              exit 0
            fi
            sleep 1
          done
          kill $PID 2>/dev/null
          echo "❌ Server failed to start"
          exit 1

      - name: Frontend lint + typecheck + build
        run: |
          pnpm --filter web run lint
          pnpm --filter web run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

  # ════════════════════════════════════════════════════════════
  # JOB 2 — CREATE GITHUB RELEASE
  # ════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d').${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Build changelog from recent commits
        id: changelog
        run: |
          LOG=$(git log --oneline -10 --pretty=format:"- %s (%h)")
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"     >> $GITHUB_OUTPUT
          echo "EOF"      >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version   = '${{ steps.tag.outputs.version }}'
            const changelog = `${{ steps.changelog.outputs.log }}`

            await github.rest.repos.createRelease({
              owner:            context.repo.owner,
              repo:             context.repo.repo,
              tag_name:         version,
              name:             `TestTrack Pro ${version}`,
              body:             `## What's Changed\n\n${changelog}`,
              draft:            false,
              prerelease:       false,
              target_commitish: context.sha
            })
            console.log(`✅ Release ${version} created`)

  # ════════════════════════════════════════════════════════════
  # JOB 3 — DEPLOY API → RENDER PRODUCTION
  # Render dashboard settings (Root Directory = blank, repo root):
  #   Build Command: pnpm install --frozen-lockfile && pnpm --filter api exec npx prisma generate && pnpm --filter api exec npx prisma migrate deploy
  #   Start Command: node apps/api/index.js
  # ════════════════════════════════════════════════════════════
  deploy-api:
    name: Deploy API → Render Production
    runs-on: ubuntu-latest
    needs: [verify, release]
    environment: production   # requires manual approval in GitHub Settings → Environments

    steps:
      - name: Trigger Render production deploy hook
        run: |
          echo "🚀 Deploying to production..."
          curl -s "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
          echo ""
          echo "✅ Deploy hook triggered"

      - name: Wait for Render build + migrations
        run: |
          echo "⏳ Waiting 2 minutes for Render to build, migrate and start..."
          sleep 120

      - name: Verify production API live
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.PROD_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production API is live!"
              exit 0
            fi
            echo "  Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "❌ Production API did not come up — check Render logs immediately"
          exit 1

  # ════════════════════════════════════════════════════════════
  # JOB 4 — DEPLOY FRONTEND → VERCEL PRODUCTION
  # vercel.json at repo root is used automatically:
  #   installCommand:  pnpm install
  #   buildCommand:    pnpm --filter web run build
  #   outputDirectory: apps/web/dist
  #   rewrites:        SPA fallback
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Deploy Frontend → Vercel Production
    runs-on: ubuntu-latest
    needs: [verify, release]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm 8.15.4
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel production
        run: |
          # --prod flag = production deployment (not preview)
          # vercel.json at root picked up automatically
          vercel \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ════════════════════════════════════════════════════════════
  # JOB 5 — SMOKE TEST PRODUCTION
  # ════════════════════════════════════════════════════════════
  smoke-test:
    name: Smoke Test Production
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]

    steps:
      - name: API health check
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.PROD_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production API healthy"
              break
            fi
            echo "  Attempt $i: HTTP $STATUS — waiting 20s..."
            sleep 20
          done
          [ "$STATUS" = "200" ] || (echo "❌ Production health check failed" && exit 1)

      - name: Auth endpoint alive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PROD_API_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"wrongpassword"}')
          if [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "422" ]; then
            echo "✅ /auth/login alive (HTTP $STATUS)"
          else
            echo "❌ Unexpected: HTTP $STATUS"
            exit 1
          fi

      - name: Swagger docs
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.PROD_API_BASE_URL }}/api-docs/")
          echo "📚 Swagger: HTTP $STATUS"

      - name: Production deploy summary
        run: |
          echo "═══════════════════════════════════════════"
          echo "  🎉 Production deploy complete!"
          echo "  Version : ${{ needs.release.outputs.version }}"
          echo "  API     : ${{ secrets.PROD_API_URL }}"
          echo "═══════════════════════════════════════════"