name: CD — Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER:     testtrack
          POSTGRES_PASSWORD: testtrack123
          POSTGRES_DB:       testtrack_test
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testtrack:testtrack123@localhost:5432/testtrack_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate + migrate
        run: |
          pnpm --filter api exec npx prisma generate
          pnpm --filter api exec npx prisma migrate deploy

      - name: Frontend typecheck + build
        run: pnpm --filter web run build
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: tag
        run: |
          VERSION="v$(date +'%Y.%m.%d').${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.tag.outputs.version }}'
            const log = require('child_process')
              .execSync('git log --oneline -10 --pretty=format:"- %s (%h)"')
              .toString()
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:         version,
              name:             `TestTrack Pro ${version}`,
              body:             `## Changes\n\n${log}`,
              draft:            false,
              prerelease:       false,
              target_commitish: context.sha
            })

  deploy-api:
    name: Deploy API → Render Production
    runs-on: ubuntu-latest
    needs: [verify, release]
    environment: production

    steps:
      - name: Trigger Render production deploy
        run: |
          curl -s "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
          echo "✅ Render production deploy triggered"

      - name: Wait for Render
        run: sleep 120

      - name: Verify production API live
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PROD_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production API live!"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "❌ Production API did not come up"
          exit 1

  deploy-frontend:
    name: Deploy Frontend → Vercel Production
    runs-on: ubuntu-latest
    needs: [verify, release]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel production
        run: vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test:
    name: Smoke Test Production
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]

    steps:
      - name: API health check
        run: |
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.PROD_API_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production API healthy"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 20s..."
            sleep 20
          done
          echo "❌ Health check failed" && exit 1

      - name: Auth endpoint alive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.PROD_API_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"wrong"}')
          if [ "$STATUS" = "400" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "422" ]; then
            echo "✅ Auth endpoint alive (HTTP $STATUS)"
          else
            echo "❌ Unexpected: $STATUS" && exit 1
          fi

      - name: Done
        run: |
          echo "🎉 Production deploy complete!"
          echo "Version: ${{ needs.release.outputs.version }}"